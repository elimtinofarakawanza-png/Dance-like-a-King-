<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="icon">
      <div class="crown">👑</div>
      <div class="arrow">↑</div>
    </div>

    <p class="title">Dance Like a King</p>

    <p class="copyright">
      © King Dance Production by E.T Kawanza and Copilot
    </p>
  </div>
  <script>
  function startGame() {
    document.body.innerHTML = `
      <div style="color:white; font-family:monospace; text-align:center; margin-top:40vh;">
        Loading the fun part...
      </div>
    `;
    // Later this will load your real menu or game
  }

  document.addEventListener("keydown", startGame);
  document.addEventListener("touchstart", startGame);
  </script>
</body>
</html>

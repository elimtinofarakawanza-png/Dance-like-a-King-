<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="icon">
      <div class="crown">👑</div>
      <div class="arrow">↑</div>
    </div>

    <p class="title">Dance Like a King</p>

    <p class="copyright">
      © King Dance Production by E.T Kawanza and Copilot
    </p>
  </div>

  <!-- MAIN MENU -->
  <div id="main-menu" style="display:none;">

    <!-- Discord Button -->
    <a href="https://discord.gg/RFQRRJraW" target="_blank" id="discord-btn">
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg" alt="Discord">
    </a>

    <div class="menu-box">
      <h1 class="menu-title">Dance Like a King</h1>

      <button class="menu-btn" onclick="playHonk(); startGame()">Play</button>
      <button class="menu-btn" onclick="playHonk(); openSettings()">Settings</button>
      <button class="menu-btn" onclick="playHonk(); openCredits()">Credits</button>
    </div>
  </div>

  <!-- GAME AREA (hidden for now) -->
  <div id="game" style="display:none;">
    <!-- Your game will go here -->
  </div>

  <!-- HONK SOUND -->
  <audio id="honk-sound" src="honk.mp3"></audio>

  <script src="game.js"></script>
</body>
</html>
